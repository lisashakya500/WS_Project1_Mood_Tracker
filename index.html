<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mood Tracker</title>

    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main app container -->
    <div class="app">

        <!-- App title -->
        <h1>Mood Journal</h1>

        <!-- Theme toggle button -->
        <button id="toggle-theme">🌗 Toggle Theme</button>

        <!-- Card for input section -->
        <div class="card">

            <!-- Mood selection buttons -->
            <div id="moodPicker" class="mood-grid">
                <button data-mood="happy">😊 <span>Happy</span></button>
                <button data-mood="sad">😢 <span>Sad</span></button>
                <button data-mood="angry">😠 <span>Angry</span></button>
                <button data-mood="relaxed">😌 <span>Relaxed</span></button>
            </div>

            <!-- Activity input -->
            <label>What did you do today?</label>
            <textarea id="activities"></textarea>

            <!-- Save button -->
            <button id="save-btn">Save Entry</button>
        </div>

        <!-- Search bar -->
        <input type="text" id="search" placeholder="🔍 Search activities...">

        <!-- Filter by mood -->
        <div id="filter" class="filter-bar">
            <button data-filter="">All</button>
            <button data-filter="happy">😊</button>
            <button data-filter="sad">😢</button>
            <button data-filter="angry">😠</button>
            <button data-filter="relaxed">😌</button>
        </div>

        <!-- Stats Dashboard -->
        <div class="stats-card">
            <h2>Your Stats</h2>

            <!-- Stats summary boxes -->
            <div class="stats-grid">
                <div class="stat-box">
                    <h3 id="totalEntries">0</h3>
                    <p>Total Entries</p>
                </div>
                <div class="stat-box">
                    <h3 id="mostFrequent">-</h3>
                    <p>Most Frequent</p>
                </div>
                <div class="stat-box">
                    <h3 id="weeklyAvg">0</h3>
                    <p>Weekly Avg</p>
                </div>
                <div class="stat-box">
                    <h3 id="streak">0</h3>
                    <p>Day Streak</p>
                </div>
            </div>

            <!-- Mood distribution section -->
            <h3>Mood Distribution</h3>

            <!-- Sliding tabs (scrollable filter UI) -->
            <div id="moodTabs" class="mood-tabs">
                <button data-tab="">All</button>
                <button data-tab="happy">😊 Happy</button>
                <button data-tab="sad">😢 Sad</button>
                <button data-tab="angry">😠 Angry</button>
                <button data-tab="relaxed">😌 Relaxed</button>
            </div>

            <!-- Bars will be generated by JavaScript -->
            <div id="moodBars"></div>
        </div>

        <!-- Entries list (generated dynamically) -->
        <div id="entries-list"></div>

    </div>

    <!-- Link to JavaScript -->
    <script src="script.js"></script>

</body>

</html>
